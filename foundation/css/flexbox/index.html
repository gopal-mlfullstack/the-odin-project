<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Flexbox</title>
</head>
<body>
    <h1>Flexbox</h1>
    <div class="flex-container">
        <!-- one -->
        <div class="one" >
            <div class="one-one"></div>
            <div class="one-two">
                <div class="one-two-one"></div>
                <div class="one-two-two"></div>
            </div>
            <div class="one-three"></div>
        </div>
        <!-- two -->
        <div class="two">
            <div class="two-one" ></div>
            <div class="two-two" >
                <div class="two-two-one" ></div>
                <div class="two-two-two" ></div>
            </div>
        </div>
        <!-- three -->
        <div class="three">
            <div class="three-one" ></div>
            <div class="three-two-smaller" ></div>
            <div class="three-three-smaller" ></div>
            <div class="three-four" ></div>
        </div>
    </div>
</body>
</html>
